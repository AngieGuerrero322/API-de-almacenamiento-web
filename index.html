<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almacenamiento localStorage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>

        <h1>Buscar Pokémon</h1>

        <!-- ✅ 1. Input para escribir el nombre -->
        <input type="text" id="nombrePokemon" placeholder="Escribir nombre del Pokémon">

        <!-- ✅ 2. Botón para buscar -->
        <button id="btnBuscar">Buscar</button>

        <!-- ✅ 3. Div para mostrar el resultado -->
        <div id="resultado">
            <img id="imagenPokemon" src="" alt="Imagen del pokemon">
            <h3 id="nombre">nombre del pokémon</h3>
        </div>

        <!-- ✅ 4. Botón para guardar como favorito -->
        <button id="btnGuardar">Guardar como favorito</button>

        <!-- ✅ 5. Sección para listar los favoritos -->
        <section>
            <h2>Mis Favoritos ⭐</h2>
            <div id="favoritos"></div>
        </section>

    </main>

    <script src="function.js"></script>
</body>
</html>
